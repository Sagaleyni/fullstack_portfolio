# ============================================================
# nginx.conf — Configuration Nginx pour le frontend React
# Sert les fichiers statiques ET redirige /api vers le backend
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Racine des fichiers statiques compilés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # ─── PROXY API ──────────────────────────────────────────
    # Toute requête commençant par /api est redirigée vers le backend
    # "backend" = nom du service dans docker-compose.yml
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── PROXY UPLOADS (images) ────────────────────────────
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
    }

    # ─── SPA ROUTING ────────────────────────────────────────
    # Pour React Router : toutes les URLs inconnues → index.html
    # Sans ça, rafraîchir /projet/123 donnerait une erreur 404 Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }
}
